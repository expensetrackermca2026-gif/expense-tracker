# Render Blueprint (https://render.com/docs/blueprint-spec)
# This configuration deploys the complete Full-Stack Flask Application (Frontend + Backend) 
# as a single Web Service on Render, which is the required setup for Python Jinja2 Templates.

services:
  - type: web
    name: expense-tracker-monolith
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false # Set this securely in your Render dashboard (e.g., NeonDB)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
